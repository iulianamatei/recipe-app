<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RecipeLab</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #f4f9f9; --surface: #ffffff; --surface2: #e8f5f3;
    --border: #c5e8e2; --accent: #0e9e8e; --accent2: #0b7a6e;
    --accent-light: #e0f5f2; --text: #1a2e2c; --muted: #6b8f8c; --r: 12px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }

  header { background: var(--accent); padding: 1.8rem 2rem 1.5rem; }
  header h1 { font-family: 'Playfair Display', serif; font-size: 1.9rem; color: #fff; }
  header p { font-size: 0.85rem; color: rgba(255,255,255,0.75); margin-top: 4px; }

  .banner { background: var(--accent2); color: #fff; padding: 2rem; display: flex; gap: 1.5rem; align-items: center; border-bottom: 3px solid var(--accent); }
  .banner img { width: 120px; height: 120px; object-fit: cover; border-radius: 10px; flex-shrink: 0; }
  .banner-body { flex: 1; }
  .banner-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; opacity: 0.75; margin-bottom: 6px; }
  .banner-title { font-family: 'Playfair Display', serif; font-size: 1.4rem; margin-bottom: 8px; }
  .banner-meta { font-size: 0.82rem; opacity: 0.8; margin-bottom: 12px; }
  .banner-btn { background: #fff; color: var(--accent2); border: none; border-radius: 8px; padding: 7px 16px; font-family: 'DM Sans', sans-serif; font-size: 0.85rem; font-weight: 500; cursor: pointer; }
  .banner-btn:hover { opacity: 0.85; }

  .wrap { max-width: 900px; margin: 0 auto; padding: 2rem 1.5rem; }

  .search-row { display: flex; gap: 10px; margin-bottom: 1rem; }
  input[type=text] {
    flex: 1; background: var(--surface); border: 1.5px solid var(--border);
    border-radius: var(--r); color: var(--text); font-family: 'DM Sans', sans-serif;
    font-size: 1rem; padding: 0.8rem 1.1rem; outline: none; transition: border-color 0.2s;
  }
  input[type=text]:focus { border-color: var(--accent); }
  input[type=text]::placeholder { color: var(--muted); }

  button.primary {
    background: var(--accent); color: #fff; border: none; border-radius: var(--r);
    font-family: 'DM Sans', sans-serif; font-size: 0.95rem; font-weight: 500;
    padding: 0.8rem 1.5rem; cursor: pointer; transition: background 0.2s;
  }
  button.primary:hover { background: var(--accent2); }
  button.primary:disabled { opacity: 0.5; cursor: not-allowed; }

  .chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 1rem; }
  .chip { background: var(--surface); border: 1.5px solid var(--border); border-radius: 999px; font-size: 0.8rem; color: var(--accent); padding: 5px 14px; cursor: pointer; transition: all 0.15s; }
  .chip:hover { background: var(--accent-light); border-color: var(--accent); }

  .filter-row { display: flex; align-items: center; gap: 10px; margin-bottom: 2rem; flex-wrap: wrap; }
  .filter-row label { font-size: 0.82rem; color: var(--muted); }
  select { background: var(--surface); border: 1.5px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.85rem; padding: 6px 12px; outline: none; cursor: pointer; }
  select:focus { border-color: var(--accent); }

  .tabs { display: flex; gap: 6px; margin-bottom: 1.5rem; flex-wrap: wrap; }
  .tab { background: var(--surface); border: 1.5px solid var(--border); border-radius: 8px; color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 0.85rem; padding: 7px 16px; cursor: pointer; transition: all 0.15s; }
  .tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .tab:hover:not(.active) { border-color: var(--accent); color: var(--accent); }

  .section-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; color: var(--muted); margin-bottom: 1rem; padding-bottom: 0.5rem; border-bottom: 1.5px solid var(--border); display: flex; align-items: center; gap: 10px; }
  .api-badge { font-size: 0.68rem; border-radius: 999px; padding: 2px 10px; font-weight: 500; letter-spacing: 0; }
  .badge-green { background: #d4f0e2; color: #1a7a42; }
  .badge-blue  { background: #d4e8f7; color: #1a5a8a; }

  .recipe-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 14px; margin-bottom: 2.5rem; }
  .card { background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--r); overflow: hidden; cursor: pointer; transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s; position: relative; }
  .card:hover { transform: translateY(-3px); border-color: var(--accent); box-shadow: 0 6px 20px rgba(14,158,142,0.12); }
  .card img { width: 100%; height: 150px; object-fit: cover; display: block; }
  .card-body { padding: 0.85rem; }
  .card-body h3 { font-size: 0.9rem; font-weight: 500; line-height: 1.3; margin-bottom: 6px; color: var(--text); }
  .card-actions { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
  .card-actions button { flex: 1; border: 1.5px solid var(--border); border-radius: 7px; background: var(--surface2); font-family: 'DM Sans', sans-serif; font-size: 0.72rem; color: var(--muted); padding: 5px 6px; cursor: pointer; transition: all 0.15s; min-width: 50px; }
  .card-actions button:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
  .card-actions button.fav-active { background: #fdecea; border-color: #e05555; color: #e05555; }

  .nutrition-box { background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--r); padding: 1.25rem; margin-bottom: 2rem; }
  .nutr-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; }
  .nutr-item { background: var(--surface2); border-radius: 8px; padding: 0.75rem; border: 1px solid var(--border); }
  .nutr-item .val { font-size: 1.3rem; font-weight: 500; color: var(--accent); }
  .nutr-item .lbl { font-size: 0.75rem; color: var(--muted); margin-top: 2px; }

  /* ── PLANNER ── */
  .planner-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; margin-bottom: 2rem; }
  .day-card { background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--r); padding: 1rem; min-height: 140px; }
  .day-card h3 { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; color: var(--accent); margin-bottom: 10px; }
  .day-meal { display: flex; align-items: center; gap: 8px; background: var(--surface2); border-radius: 8px; padding: 6px 8px; margin-bottom: 6px; border: 1px solid var(--border); }
  .day-meal img { width: 36px; height: 36px; border-radius: 6px; object-fit: cover; flex-shrink: 0; }
  .day-meal-name { font-size: 0.78rem; flex: 1; line-height: 1.3; color: var(--text); }
  .day-meal-remove { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 1rem; padding: 0 2px; flex-shrink: 0; }
  .day-meal-remove:hover { color: #e05555; }
  .day-empty { font-size: 0.78rem; color: var(--muted); text-align: center; padding: 1rem 0; }
  .clear-planner-btn { background: none; border: 1.5px solid #f5c5c0; border-radius: 8px; color: #e05555; font-family: 'DM Sans', sans-serif; font-size: 0.8rem; padding: 6px 14px; cursor: pointer; margin-bottom: 1.5rem; }
  .clear-planner-btn:hover { background: #fdecea; }

  .empty-favs { text-align: center; padding: 3rem 1rem; color: var(--muted); font-size: 0.9rem; }
  .status { text-align: center; padding: 4rem 1rem; color: var(--muted); }
  .loading { color: var(--muted); font-size: 0.9rem; margin-bottom: 1rem; }
  .error { color: #a33; background: #fdecea; border-radius: var(--r); padding: 1rem; margin-bottom: 1rem; font-size: 0.9rem; border: 1px solid #f5c5c0; }

  .toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%); background: var(--accent); color: #fff; border-radius: 999px; padding: 10px 24px; font-size: 0.85rem; font-weight: 500; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 999; }
  .toast.show { opacity: 1; }

  /* ── MODAL ── */
  .modal-bg { display: none; position: fixed; inset: 0; background: rgba(10,40,38,0.55); z-index: 100; align-items: center; justify-content: center; padding: 1rem; }
  .modal-bg.open { display: flex; }
  .modal { background: var(--surface); border: 1.5px solid var(--border); border-radius: 16px; max-width: 580px; width: 100%; max-height: 88vh; overflow-y: auto; padding: 1.5rem; }
  .modal h2 { font-family: 'Playfair Display', serif; font-size: 1.4rem; margin-bottom: 0.5rem; color: var(--text); }
  .modal img.meal-img { width: 100%; border-radius: 10px; margin-bottom: 1rem; }
  .modal .meta { font-size: 0.8rem; color: var(--muted); margin-bottom: 1rem; }
  .modal h3 { font-size: 0.78rem; text-transform: uppercase; letter-spacing: 1px; color: var(--accent); margin: 1rem 0 0.5rem; }
  .modal p { font-size: 0.9rem; line-height: 1.6; color: #444; }
  .modal ul { list-style: none; padding: 0; }
  .modal ul li { font-size: 0.88rem; color: #333; padding: 5px 0; border-bottom: 1px solid var(--border); }
  .modal-actions { display: flex; gap: 8px; margin-bottom: 1rem; flex-wrap: wrap; }
  .modal-actions button { border: 1.5px solid var(--border); border-radius: 8px; background: var(--surface2); font-family: 'DM Sans', sans-serif; font-size: 0.82rem; color: var(--muted); padding: 7px 14px; cursor: pointer; transition: all 0.15s; }
  .modal-actions button:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
  .video-wrap { position: relative; padding-bottom: 56.25%; height: 0; margin: 0.5rem 0 1rem; border-radius: 10px; overflow: hidden; }
  .video-wrap iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
  .day-select-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; background: var(--surface2); border-radius: 10px; padding: 10px; border: 1px solid var(--border); margin-bottom: 1rem; }
  .day-select-row label { font-size: 0.82rem; color: var(--muted); }
  .day-select-row select { font-size: 0.82rem; padding: 5px 10px; }
  .day-select-row button { background: var(--accent); color: #fff; border: none; border-radius: 7px; font-family: 'DM Sans', sans-serif; font-size: 0.82rem; padding: 6px 14px; cursor: pointer; }
  .day-select-row button:hover { background: var(--accent2); }
  .close-btn { float: right; background: var(--accent-light); border: 1px solid var(--border); color: var(--accent2); border-radius: 8px; padding: 4px 12px; cursor: pointer; font-size: 0.85rem; margin-bottom: 0.5rem; }
  .close-btn:hover { background: var(--border); }
</style>
</head>
<body>

<header>
  <h1>RecipeLab</h1>
  <p>Search recipes & get nutrition info — powered by TheMealDB & Open Food Facts</p>
</header>

<div id="banner"></div>

<div class="wrap">
  <div class="search-row">
    <input type="text" id="query" placeholder="Type an ingredient (e.g. chicken, pasta, salmon)..."/>
    <button class="primary" id="searchBtn" onclick="doSearch()">Search</button>
  </div>

  <div class="chips">
    <span class="chip" onclick="quickSearch('chicken')">🍗 Chicken</span>
    <span class="chip" onclick="quickSearch('pasta')">🍝 Pasta</span>
    <span class="chip" onclick="quickSearch('salmon')">🐟 Salmon</span>
    <span class="chip" onclick="quickSearch('beef')">🥩 Beef</span>
    <span class="chip" onclick="quickSearch('vegetable')">🥦 Vegetable</span>
    <span class="chip" onclick="quickSearch('egg')">🥚 Egg</span>
  </div>

  <div class="filter-row">
    <label>Filter by category:</label>
    <select id="categoryFilter" onchange="applyFilter()">
      <option value="all">All categories</option>
      <option value="Beef">Beef</option>
      <option value="Chicken">Chicken</option>
      <option value="Seafood">Seafood</option>
      <option value="Vegetarian">Vegetarian</option>
      <option value="Pasta">Pasta</option>
      <option value="Dessert">Dessert</option>
    </select>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('results')">🔍 Results</button>
    <button class="tab" onclick="switchTab('favourites')">❤️ Favourites (<span id="favCount">0</span>)</button>
    <button class="tab" onclick="switchTab('planner')">📅 Meal Planner</button>
  </div>

  <div id="output">
    <div class="status">
      <div style="font-size:2.5rem; margin-bottom:0.5rem">🍽️</div>
      <div>Search an ingredient to discover recipes and nutrition info.</div>
    </div>
  </div>
  <div id="favOutput" style="display:none"></div>
  <div id="plannerOutput" style="display:none"></div>
</div>

<div class="toast" id="toast"></div>

<div class="modal-bg" id="modalBg" onclick="closeModal(event)">
  <div class="modal" id="modalContent"></div>
</div>

<script>
  let allMeals = [];
  let currentMeal = null;
  let favourites = JSON.parse(localStorage.getItem('recipelab-favs') || '[]');
  let planner = JSON.parse(localStorage.getItem('recipelab-planner') || '{}');
  let currentTab = 'results';
  const DAYS = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'];

  updateFavCount();
  loadBanner();

  async function loadBanner() {
    try {
      const res = await fetch('https://www.themealdb.com/api/json/v1/1/random.php');
      const data = await res.json();
      const m = data.meals[0];
      document.getElementById('banner').innerHTML = `
        <div class="banner">
          <img src="${m.strMealThumb}" alt="${m.strMeal}"/>
          <div class="banner-body">
            <div class="banner-label">✨ Recipe of the day</div>
            <div class="banner-title">${m.strMeal}</div>
            <div class="banner-meta">${m.strCategory} · ${m.strArea}</div>
            <button class="banner-btn" onclick="openMeal('${m.idMeal}')">View Recipe</button>
          </div>
        </div>`;
    } catch(e) {}
  }

  function quickSearch(term) {
    document.getElementById('query').value = term;
    doSearch();
  }

  async function doSearch() {
    const q = document.getElementById('query').value.trim();
    if (!q) return;
    const btn = document.getElementById('searchBtn');
    btn.disabled = true; btn.textContent = 'Searching...';
    switchTab('results');
    document.getElementById('output').innerHTML = '<div class="loading">Fetching data...</div>';
    document.getElementById('categoryFilter').value = 'all';
    try {
      const [mealsData, nutritionData] = await Promise.all([fetchMeals(q), fetchNutrition(q)]);
      allMeals = mealsData;
      renderResults(q, allMeals, nutritionData);
    } catch(e) {
      document.getElementById('output').innerHTML = `<div class="error">Something went wrong: ${e.message}</div>`;
    }
    btn.disabled = false; btn.textContent = 'Search';
  }

  async function fetchMeals(ingredient) {
    const res = await fetch(`https://www.themealdb.com/api/json/v1/1/filter.php?i=${encodeURIComponent(ingredient)}`);
    const data = await res.json();
    return data.meals || [];
  }

  async function fetchNutrition(ingredient) {
    const res = await fetch(`https://world.openfoodfacts.org/cgi/search.pl?search_terms=${encodeURIComponent(ingredient)}&search_simple=1&action=process&json=1&page_size=1`);
    const data = await res.json();
    return data.products && data.products.length > 0 ? data.products[0] : null;
  }

  async function applyFilter() {
    const cat = document.getElementById('categoryFilter').value;
    if (cat === 'all') { renderCards(allMeals); return; }
    const grid = document.getElementById('recipeGrid');
    if (!grid) return;
    grid.innerHTML = '<div style="color:var(--muted); font-size:0.9rem; padding:1rem 0">Filtering...</div>';
    try {
      const res = await fetch(`https://www.themealdb.com/api/json/v1/1/filter.php?c=${encodeURIComponent(cat)}`);
      const data = await res.json();
      const catMeals = data.meals || [];
      const filtered = allMeals.filter(m => catMeals.some(cm => cm.idMeal === m.idMeal));
      filtered.length === 0
        ? grid.innerHTML = `<div style="color:var(--muted); font-size:0.9rem; padding:1rem 0">No recipes match "${cat}" in these results.</div>`
        : renderCards(filtered);
    } catch(e) {
      grid.innerHTML = '<div style="color:#a33; font-size:0.9rem;">Error filtering.</div>';
    }
  }

  function renderResults(q, meals, nutrition) {
    let html = '';
    if (nutrition && nutrition.nutriments) {
      const n = nutrition.nutriments;
      const name   = nutrition.product_name || q;
      const kcal   = Math.round(n['energy-kcal_100g'] || n['energy-kcal'] || 0);
      const protein = (n['proteins_100g'] || 0).toFixed(1);
      const fat     = (n['fat_100g'] || 0).toFixed(1);
      const carbs   = (n['carbohydrates_100g'] || 0).toFixed(1);
      const fiber   = (n['fiber_100g'] || 0).toFixed(1);
      html += `
        <div class="section-label">Nutrition info — ${name} (per 100g) <span class="api-badge badge-green">Open Food Facts API</span></div>
        <div class="nutrition-box">
          <div class="nutr-grid">
            <div class="nutr-item"><div class="val">${kcal}</div><div class="lbl">Calories (kcal)</div></div>
            <div class="nutr-item"><div class="val">${protein}g</div><div class="lbl">Protein</div></div>
            <div class="nutr-item"><div class="val">${fat}g</div><div class="lbl">Fat</div></div>
            <div class="nutr-item"><div class="val">${carbs}g</div><div class="lbl">Carbs</div></div>
            <div class="nutr-item"><div class="val">${fiber}g</div><div class="lbl">Fiber</div></div>
          </div>
        </div>`;
    } else {
      html += `<div class="nutrition-box" style="color:var(--muted); font-size:0.9rem;">No nutrition data found for "<strong>${q}</strong>".</div>`;
    }
    if (meals.length === 0) {
      html += `<div class="section-label">Recipes</div><div class="status" style="padding:2rem">No recipes found for "${q}".</div>`;
      document.getElementById('output').innerHTML = html; return;
    }
    html += `
      <div class="section-label">Recipes with ${q} — ${meals.length} found <span class="api-badge badge-blue">TheMealDB API</span></div>
      <div class="recipe-grid" id="recipeGrid"></div>`;
    document.getElementById('output').innerHTML = html;
    renderCards(meals);
  }

  function renderCards(meals) {
    const grid = document.getElementById('recipeGrid');
    if (!grid) return;
    if (meals.length === 0) {
      grid.innerHTML = '<div style="color:var(--muted); font-size:0.9rem; padding:1rem 0">No recipes match this filter.</div>'; return;
    }
    grid.innerHTML = meals.slice(0, 16).map(m => {
      const isFav = favourites.some(f => f.idMeal === m.idMeal);
      return `
        <div class="card">
          <img src="${m.strMealThumb}/preview" alt="${m.strMeal}" loading="lazy" onclick="openMeal('${m.idMeal}')"/>
          <div class="card-body">
            <h3 onclick="openMeal('${m.idMeal}')">${m.strMeal}</h3>
            <div class="card-actions">
              <button class="${isFav ? 'fav-active' : ''}" onclick="toggleFav('${m.idMeal}','${m.strMeal.replace(/'/g,"\\'")}','${m.strMealThumb}',this)">
                ${isFav ? '❤️ Saved' : '🤍 Save'}
              </button>
              <button onclick="shareRecipe('${m.idMeal}','${m.strMeal.replace(/'/g,"\\'")}')">🔗 Share</button>
            </div>
          </div>
        </div>`;
    }).join('');
  }

  function toggleFav(id, name, thumb, btn) {
    const exists = favourites.findIndex(f => f.idMeal === id);
    if (exists >= 0) {
      favourites.splice(exists, 1);
      btn.textContent = '🤍 Save'; btn.classList.remove('fav-active');
      showToast('Removed from favourites');
    } else {
      favourites.push({ idMeal: id, strMeal: name, strMealThumb: thumb });
      btn.textContent = '❤️ Saved'; btn.classList.add('fav-active');
      showToast('Added to favourites!');
    }
    localStorage.setItem('recipelab-favs', JSON.stringify(favourites));
    updateFavCount();
    if (currentTab === 'favourites') renderFavourites();
  }

  function shareRecipe(id, name) {
    navigator.clipboard.writeText(`https://www.themealdb.com/meal/${id}`)
      .then(() => showToast('Link copied: ' + name));
  }

  function updateFavCount() {
    document.getElementById('favCount').textContent = favourites.length;
  }

  function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.tab').forEach((t, i) => {
      t.classList.toggle('active',
        (i===0 && tab==='results') || (i===1 && tab==='favourites') || (i===2 && tab==='planner'));
    });
    document.getElementById('output').style.display       = tab === 'results'    ? 'block' : 'none';
    document.getElementById('favOutput').style.display    = tab === 'favourites' ? 'block' : 'none';
    document.getElementById('plannerOutput').style.display = tab === 'planner'   ? 'block' : 'none';
    if (tab === 'favourites') renderFavourites();
    if (tab === 'planner') renderPlanner();
  }

  function renderFavourites() {
    const el = document.getElementById('favOutput');
    if (favourites.length === 0) {
      el.innerHTML = '<div class="empty-favs">❤️<br><br>No favourites yet.<br>Search recipes and save the ones you like!</div>'; return;
    }
    el.innerHTML = `
      <div class="section-label">Your saved recipes — ${favourites.length}</div>
      <div class="recipe-grid">
        ${favourites.map(m => `
          <div class="card">
            <img src="${m.strMealThumb}/preview" alt="${m.strMeal}" loading="lazy" onclick="openMeal('${m.idMeal}')"/>
            <div class="card-body">
              <h3 onclick="openMeal('${m.idMeal}')">${m.strMeal}</h3>
              <div class="card-actions">
                <button class="fav-active" onclick="toggleFav('${m.idMeal}','${m.strMeal.replace(/'/g,"\\'")}','${m.strMealThumb}',this)">❤️ Saved</button>
                <button onclick="shareRecipe('${m.idMeal}','${m.strMeal.replace(/'/g,"\\'")}')">🔗 Share</button>
              </div>
            </div>
          </div>`).join('')}
      </div>`;
  }

  function renderPlanner() {
    const el = document.getElementById('plannerOutput');
    const hasAny = DAYS.some(d => planner[d] && planner[d].length > 0);
    el.innerHTML = `
      <div class="section-label">📅 Weekly Meal Planner</div>
      ${hasAny ? `<button class="clear-planner-btn" onclick="clearPlanner()">🗑️ Clear all</button>` : ''}
      <div class="planner-grid">
        ${DAYS.map(day => `
          <div class="day-card">
            <h3>${day}</h3>
            ${planner[day] && planner[day].length > 0
              ? planner[day].map((m, i) => `
                  <div class="day-meal">
                    <img src="${m.strMealThumb}/preview" alt="${m.strMeal}"/>
                    <span class="day-meal-name">${m.strMeal}</span>
                    <button class="day-meal-remove" onclick="removeMealFromDay('${day}',${i})" title="Remove">×</button>
                  </div>`).join('')
              : '<div class="day-empty">No meals yet</div>'}
          </div>`).join('')}
      </div>`;
  }

  function addMealToDay(day) {
    if (!currentMeal) return;
    if (!planner[day]) planner[day] = [];
    if (planner[day].some(m => m.idMeal === currentMeal.idMeal)) {
      showToast('Already added to ' + day); return;
    }
    planner[day].push({ idMeal: currentMeal.idMeal, strMeal: currentMeal.strMeal, strMealThumb: currentMeal.strMealThumb });
    localStorage.setItem('recipelab-planner', JSON.stringify(planner));
    showToast(`Added to ${day}!`);
  }

  function removeMealFromDay(day, index) {
    planner[day].splice(index, 1);
    localStorage.setItem('recipelab-planner', JSON.stringify(planner));
    renderPlanner();
  }

  function clearPlanner() {
    planner = {};
    localStorage.setItem('recipelab-planner', JSON.stringify(planner));
    renderPlanner();
    showToast('Planner cleared');
  }

  async function openMeal(id) {
  document.getElementById('modalContent').innerHTML =
    '<div style="text-align:center; padding:2rem; color:var(--muted)">Loading...</div>';

  document.getElementById('modalBg').classList.add('open');

  const res = await fetch(`https://www.themealdb.com/api/json/v1/1/lookup.php?i=${id}`);
  const data = await res.json();
  const m = data.meals[0];

  currentMeal = {
    idMeal: m.idMeal,
    strMeal: m.strMeal,
    strMealThumb: m.strMealThumb
  };

  const ingredients = [];

  for (let i = 1; i <= 20; i++) {
    const ing = m[`strIngredient${i}`];
    const meas = m[`strMeasure${i}`];

    if (ing && ing.trim()) {
      ingredients.push(
        `${meas ? meas.trim() + ' ' : ''}${ing.trim()}`
      );
    }
  }

  const isFav = favourites.some(f => f.idMeal === m.idMeal);

  document.getElementById('modalContent').innerHTML = `
    <button class="close-btn"
      onclick="document.getElementById('modalBg').classList.remove('open')">
      ✕ Close
    </button>

    <h2>${m.strMeal}</h2>

    <div class="meta">
      ${m.strCategory || ''}
      ${m.strArea ? '· ' + m.strArea : ''}
    </div>

    <div class="modal-actions">
      <button onclick="toggleFavFromModal(
        '${m.idMeal}',
        '${m.strMeal.replace(/'/g,"\\'")}',
        '${m.strMealThumb}',
        this
      )">
        ${isFav ? '❤️ Saved' : '🤍 Save'}
      </button>

      <button onclick="shareRecipe(
        '${m.idMeal}',
        '${m.strMeal.replace(/'/g,"\\'")}'
      )">
        🔗 Share
      </button>
    </div>

    <div class="day-select-row">
      <label>📅 Add to planner:</label>

      <select id="daySelect">
        ${DAYS.map(d => `
          <option value="${d}">${d}</option>
        `).join('')}
      </select>

      <button onclick="addMealToDay(
        document.getElementById('daySelect').value
      )">
        Add
      </button>
    </div>

    <img class="meal-img"
      src="${m.strMealThumb}"
      alt="${m.strMeal}"/>

    <h3>Ingredients</h3>

    <ul>
      ${ingredients.map(i => `<li>${i}</li>`).join('')}
    </ul>

    <h3>Instructions</h3>

    <p>
      ${
        m.strInstructions
          ? m.strInstructions.slice(0, 700) + '...'
          : 'No instructions available.'
      }
    </p>
  `;
}
  function toggleFavFromModal(id, name, thumb, btn) {
    const exists = favourites.findIndex(f => f.idMeal === id);
    if (exists >= 0) {
      favourites.splice(exists, 1);
      btn.textContent = '🤍 Save';
      showToast('Removed from favourites');
    } else {
      favourites.push({ idMeal: id, strMeal: name, strMealThumb: thumb });
      btn.textContent = '❤️ Saved';
      showToast('Added to favourites!');
    }
    localStorage.setItem('recipelab-favs', JSON.stringify(favourites));
    updateFavCount();
  }

  function closeModal(e) {
    if (e.target.id === 'modalBg') { document.getElementById('modalBg').classList.remove('open'); currentMeal = null; }
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  document.getElementById('query').addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });
</script>
</body>
</html>
